name: Nubenetes Automated Agentic Curation

on:
  schedule:
    - cron: '0 5 * * 0'
  workflow_dispatch:
    inputs:
      since_date:
        description: 'Extraer posts DESDE esta fecha (Formato: YYYY-MM-DD)'
        required: false
        default: ''
      extraction_strategy:
        description: 'Estrategia de Extracción'
        required: true
        default: 'search'
        type: choice
        options:
          - search
          - scroll
      historical_mode:
        description: 'Activar Modo Histórico (Ignora fecha de 30 días)'
        required: false
        default: 'false'
        type: boolean
      historical_until_date:
        description: 'Fecha límite superior (tramo)'
        required: false
        default: ''
        # Explicación para el usuario:
        # scroll: MÁS EXHAUSTIVO. Simula navegación humana. Captura TODO, pero puede ser limitado por X en fechas muy antiguas.
        # search: MÁS FIABLE PARA 2024. Usa búsqueda avanzada. Llega siempre a la fecha, pero el algoritmo de X puede filtrar posts.

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  agentic-curation-process:
    runs-on: ubuntu-latest
    steps:
      - name: Sincronización del repositorio
        uses: actions/checkout@v4

      - name: Provisión del Entorno Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalación de dependencias (LIGERO Y ROBUSTO)
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir pydantic PyGithub aiohttp beautifulsoup4 httpx fake-useragent pytz python-dotenv twikit>=2.1.2 playwright playwright-stealth
          playwright install chromium --with-deps

      - name: Ejecución de la Canalización Agéntica Integral
        env:
          TWITTER_USERNAME: ${{ secrets.TWITTER_USERNAME }}
          TWITTER_EMAIL: ${{ secrets.TWITTER_EMAIL }}
          TWITTER_PASSWORD: ${{ secrets.TWITTER_PASSWORD }}
          TWITTER_COOKIES: ${{ secrets.TWITTER_COOKIES }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXTRACTION_STRATEGY: ${{ github.event.inputs.extraction_strategy || 'search' }}
          HISTORICAL_MODE: ${{ github.event.inputs.historical_mode || 'false' }}
          SINCE_DATE_OVERRIDE: ${{ github.event.inputs.since_date || '' }}
          HISTORICAL_UNTIL_DATE: ${{ github.event.inputs.historical_until_date || '' }}
          HISTORICAL_CHUNK_DAYS: '180'
          PYTHONPATH: .
        run: |
          python src/main.py
          
          # Lógica de Re-disparo para Modo Histórico
          if [ -f output.log ] && grep -q "NEXT_CHUNK_START:" output.log; then
            NEXT_DATE=$(grep "NEXT_CHUNK_START:" output.log | awk '{print $2}')
            echo "Disparando siguiente tramo histórico hasta: $NEXT_DATE"
            gh workflow run agentic_cron.yml -f historical_mode=true -f historical_until_date=$NEXT_DATE
          fi

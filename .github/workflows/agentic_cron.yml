name: Nubenetes Automated Agentic Curation

on:
  schedule:
    - cron: '0 5 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  agentic-curation-process:
    runs-on: ubuntu-latest
    steps:
      - name: Sincronización del repositorio
        uses: actions/checkout@v4

      - name: Provisión del Entorno Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalación de dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Instalación de dependencias (LIMPIEZA TOTAL)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # Forzamos instalación sin caché y con lo mínimo indispensable
          pip install --no-cache-dir google-generativeai pydantic PyGithub aiohttp beautifulsoup4 httpx fake-useragent pytz python-dotenv twikit==1.7.6

      - name: Ejecución de la Canalización Agéntica Integral
        env:
          TWITTER_USERNAME: ${{ secrets.TWITTER_USERNAME }}
          TWITTER_EMAIL: ${{ secrets.TWITTER_EMAIL }}
          TWITTER_PASSWORD: ${{ secrets.TWITTER_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONPATH: .
        run: |
          python src/main.py discovery

name: Nubenetes Intelligent Link Cleaner & Dedup

on:
  schedule:
    - cron: '0 0 1 */3 *' # Quarterly: 1st of Jan, Apr, Jul, Oct
  workflow_dispatch:
    inputs:
      force_full_check:
        description: 'Force full re-validation (bypasses 21-day cache)'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  intelligent-clean-process:
    runs-on: ubuntu-latest
    # This job can now be triggered from any branch but will always checkout 'develop'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Repository Synchronization
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Python 3.11 Environment Provisioning
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Dependencies and Playwright Installation
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir pydantic PyGithub aiohttp beautifulsoup4 httpx fake-useragent pytz python-dotenv playwright PyYAML
          playwright install chromium --with-deps

      - name: Global Intelligent Cleaning Execution
        env:
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_FULL_CHECK: ${{ github.event.inputs.force_full_check || 'false' }}
          PYTHONPATH: ${{ github.workspace }}
          PYTHONUNBUFFERED: 1
        run: |
          python src/intelligent_health_checker.py

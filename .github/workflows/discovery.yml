name: Nubenetes - Discovery & Ingestion

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  discovery-process:
    runs-on: ubuntu-latest
    steps:
      - name: Sincronización del repositorio
        uses: actions/checkout@v4
      
      - name: Provisión del Entorno Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Instalación de dependencias del sistema (Protobuf)
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          echo "PROTOC=$(which protoc)" >> $GITHUB_ENV
          
      - name: Instalación del Árbol de Dependencias
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # Instalamos grpcio primero para evitar que otras lo compilen mal
          pip install grpcio-tools 
          pip install -r requirements.txt
          
      - name: Ejecución de Descubrimiento e Inyección
        env:
          TWITTER_USERNAME: ${{ secrets.TWITTER_USERNAME }}
          TWITTER_EMAIL: ${{ secrets.TWITTER_EMAIL }}
          TWITTER_PASSWORD: ${{ secrets.TWITTER_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONPATH: .
        run: |
          python src/main.py discovery

site_name: "Nubenetes V2 | The Architect's Cut"
site_url: "https://nubenetes.com/v2/"
site_description: "Enterprise-grade curated portal for the 2026 Cloud Native ecosystem."
site_author: "Inaki Fernandez"
copyright: "Copyright &copy; 2026 Nubenetes Agentic Intelligence"

repo_name: "nubenetes/awesome-kubernetes"
repo_url: "https://github.com/nubenetes/awesome-kubernetes"
edit_uri: "edit/master/v2-docs/"

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: indigo
      toggle:
        icon: material/shield-outline
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/shield
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.view
    - content.action.edit

extra_css:
  - https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.mermaid_format
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - "The 2026 Vision": index.md
  - "Elite Portal": [] # Dynamically populated
